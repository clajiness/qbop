name: qbop_ci

on:
  push:
    branches:
      - "**"
      - "!main"
  pull_request:
    types:
      - closed

jobs:
  build:
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read file contents
        uses: guibranco/github-file-reader-action-v2@0bde70edb8e1a58f31372048472b5d914b7f81e1 # v2.2.910
        id: file-contents
        with:
          path: "version.yml"

      - name: Parse version
        id: version
        shell: bash
        run: |
          VERSION="$(echo '${{ steps.file-contents.outputs.contents }}' | tr -d '\r\n' | xargs)"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"

          echo "full=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Check if full tag exists
        uses: action-pack/tag-exists@e3a3c2baef96878a14417f8c1424e6da5c2167bd # v1.08
        id: check-tag
        with:
          tag: ${{ steps.version.outputs.full }}

      - name: Docker metadata for non-main
        if: github.event_name == 'push' && github.ref != 'refs/heads/main' && (steps.check-tag.outputs.exists == 'false' || steps.check-tag.outputs.exists == '')
        id: meta_non_main
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.full }}

      - name: Docker metadata for main
        if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.merged == true && (steps.check-tag.outputs.exists == 'false' || steps.check-tag.outputs.exists == '')
        id: meta_main
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.full }}

      - name: Build and push to non-main
        if: github.event_name == 'push' && github.ref != 'refs/heads/main' && (steps.check-tag.outputs.exists == 'false' || steps.check-tag.outputs.exists == '')
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          build-args: |
            VERSION=${{ steps.version.outputs.full }}
          platforms: linux/amd64,linux/arm64/v8
          push: true
          provenance: false
          tags: ${{ steps.meta_non_main.outputs.tags }}
          labels: ${{ steps.meta_non_main.outputs.labels }}

      - name: Build and push to main
        if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.merged == true && (steps.check-tag.outputs.exists == 'false' || steps.check-tag.outputs.exists == '')
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          build-args: |
            VERSION=${{ steps.version.outputs.full }}
          platforms: linux/amd64,linux/arm64/v8
          push: true
          provenance: false
          tags: ${{ steps.meta_main.outputs.tags }}
          labels: ${{ steps.meta_main.outputs.labels }}
